<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资产层日报</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 1100px; margin: 0 auto; }
  .nav { font-size: 13px; color: #aaa; margin-bottom: 20px; }
  .nav a { color: #aaa; text-decoration: none; } .nav a:hover { color: #666; }
  h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 4px; }
  .meta { color: #999; font-size: 13px; margin-bottom: 28px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }

  .col { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; }
  .col-header { padding: 18px 20px 14px; border-bottom: 1px solid #f0f0f0; }
  .col-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
  .tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; margin-bottom: 4px; }
  .tag-macro   { background: #e8f4fd; color: #1a6fa8; }
  .tag-futures { background: #fdf3e8; color: #a86a1a; }
  .tag-equity  { background: #edf8ee; color: #1a8a2a; }
  .col-count { font-size: 12px; color: #bbb; }

  .report-list a { display: flex; justify-content: space-between; align-items: center; padding: 11px 20px; color: #333; text-decoration: none; font-size: 13px; border-bottom: 1px solid #f7f7f7; }
  .report-list a:last-child { border-bottom: none; }
  .report-list a:hover { background: #f5f9ff; }
  .report-list a .arrow { color: #ccc; flex-shrink: 0; margin-left: 8px; }
  .empty { padding: 24px 20px; color: #bbb; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="../">← 返回首页</a></div>
  <h1>资产层日报</h1>
  <p class="meta">内部使用</p>

  <div class="grid">
    <div class="col">
      <div class="col-header">
        <div><span class="tag tag-macro">宏观</span></div>
        <div class="col-title">宏观 &amp; 大类资产日报</div>
        <div class="col-count" id="c-macro"></div>
      </div>
      <div class="report-list" id="l-macro"></div>
    </div>
    <div class="col">
      <div class="col-header">
        <div><span class="tag tag-futures">期货</span></div>
        <div class="col-title">期货日报</div>
        <div class="col-count" id="c-futures"></div>
      </div>
      <div class="report-list" id="l-futures"></div>
    </div>
    <div class="col">
      <div class="col-header">
        <div><span class="tag tag-equity">权益</span></div>
        <div class="col-title">权益日报</div>
        <div class="col-count" id="c-equity"></div>
      </div>
      <div class="report-list" id="l-equity"></div>
    </div>
  </div>
</div>

<script>
// FILE LISTS — auto-updated by GitHub Actions on each push
const macro = [
  "macro/资产日复盘_2026-06-23.html",
  "macro/资产日复盘_2026-06-22.html",
  "macro/资产日复盘_2026-06-18.html",
  "macro/资产日复盘_2026-06-17.html",
  "macro/资产日复盘_2026-06-16.html",
];
const futures = [
  "futures/futures_daily_2026-06-24.html",
  "futures/futures_daily_2026-06-23.html",
];
const equity = [
  "equity/equity_daily_report_2026-06-23.html",
  "equity/equity_daily_report_2026-06-22.html",
];

function labelFromPath(p) {
  return decodeURIComponent(p.split("/").pop().replace(".html", ""));
}
function renderList(listId, countId, items) {
  document.getElementById(countId).textContent = items.length ? items.length + " 篇" : "";
  document.getElementById(listId).innerHTML = items.length
    ? items.map(f => `<a href="${f}"><span>${labelFromPath(f)}</span><span class="arrow">›</span></a>`).join("")
    : '<div class="empty">暂无报告</div>';
}

renderList("l-macro",   "c-macro",   macro);
renderList("l-futures", "c-futures", futures);
renderList("l-equity",  "c-equity",  equity);
</script>
</body>
</html>
