<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e17; --surface: #111827; --surface2: #0f1623; --border: #1f2937;
    --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #475569;
    --blue: #3b82f6; --blue-dim: rgba(59,130,246,0.12); --blue-border: rgba(59,130,246,0.4);
    --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
    --purple: #a855f7; --purple-dim: rgba(168,85,247,0.12);
  }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #14213a 0%, var(--bg) 55%);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh; padding: 56px 18px 48px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 40px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--blue); background: var(--blue-dim); border: 1px solid var(--blue-border);
    border-radius: 20px; padding: 4px 12px; margin-bottom: 18px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
  h1 span { color: var(--blue); }
  .subtitle { color: var(--text-secondary); font-size: 13.5px; }

  /* 纵向卡片堆叠 */
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .card {
    position: relative; display: flex; align-items: center; gap: 16px;
    padding: 18px 18px 18px 22px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; text-decoration: none; color: inherit; overflow: hidden;
    transition: transform .18s, border-color .18s, box-shadow .18s;
  }
  .card::before { content: ''; position: absolute; left: 0; top: 12px; bottom: 12px; width: 3px; border-radius: 0 3px 3px 0; }
  .blue::before { background: var(--blue); } .green::before { background: var(--green); } .purple::before { background: var(--purple); }
  .card.inactive { opacity: .5; }
  .card.inactive::before { opacity: .45; }
  .card.active:hover { transform: translateY(-2px); border-color: var(--blue-border); box-shadow: 0 6px 26px rgba(59,130,246,0.18); }
  .green.active:hover { border-color: rgba(34,197,94,0.4); box-shadow: 0 6px 26px rgba(34,197,94,0.18); }
  .green.active:hover .arrow { color: var(--green); }

  .icon { width: 52px; height: 52px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .blue .icon { background: var(--blue-dim); } .green .icon { background: var(--green-dim); } .purple .icon { background: var(--purple-dim); }

  .body { flex: 1; min-width: 0; }
  .meta { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
  .blue .meta { color: var(--blue); } .green .meta { color: var(--green); } .purple .meta { color: var(--purple); }
  .title { font-size: 17px; font-weight: 600; margin-bottom: 5px; }
  .desc { font-size: 12px; color: var(--text-secondary); line-height: 1.65; }

  .end { display: flex; flex-direction: column; align-items: flex-end; gap: 9px; flex-shrink: 0; }
  .status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
  .status.live { color: var(--green); }
  .status.live::before { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--border); color: var(--text-muted); white-space: nowrap; }
  .arrow { color: var(--text-muted); font-size: 18px; transition: color .15s, transform .15s; }
  .card.active:hover .arrow { color: var(--blue); transform: translateX(3px); }

  .footer { margin-top: 40px; text-align: center; color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="eyebrow"><span class="dot"></span>Internal Use Only</div>
    <h1>Research <span>Hub</span></h1>
    <p class="subtitle">内部研究平台 · 点击模块进入对应系统</p>
  </div>

  <div class="stack">

    <a class="card active blue" href="asset/">
      <div class="icon">📊</div>
      <div class="body">
        <div class="meta">Asset Layer</div>
        <div class="title">资产层日报</div>
        <div class="desc">宏观 &amp; 大类资产 · 期货日报 · 权益日报 · 每日复盘与市场观点</div>
      </div>
      <div class="end"><span class="status live">运行中</span><span class="arrow">→</span></div>
    </a>

    <a class="card active green" href="strategy/">
      <div class="icon">🔬</div>
      <div class="body">
        <div class="meta">Strategy Layer</div>
        <div class="title">策略层报告</div>
        <div class="desc">A股择时策略 · 2.1.1 五维度择时看板 · 量化策略研究输出</div>
      </div>
      <div class="end"><span class="status live">运行中</span><span class="arrow">→</span></div>
    </a>

    <div class="card inactive purple">
      <div class="icon">📁</div>
      <div class="body">
        <div class="meta">Reserved</div>
        <div class="title">更多模块</div>
        <div class="desc">待规划</div>
      </div>
      <div class="end"><span class="status">规划中</span><span class="badge">TBD</span></div>
    </div>

  </div>

  <div class="footer">Internal Research Platform · 请勿外传</div>
</div>
</body>
</html>
