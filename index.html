<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内部研究平台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0d1117;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .header { text-align: center; margin-bottom: 56px; }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    color: #f0f6fc;
    letter-spacing: 0.02em;
    margin-bottom: 10px;
  }
  .header p { color: #8b949e; font-size: 14px; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 720px;
  }

  .card {
    position: relative;
    border-radius: 16px;
    padding: 32px 28px;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-4px); }

  .card-asset {
    background: linear-gradient(135deg, #1c2a3a 0%, #162032 100%);
    border: 1px solid #2a4060;
    box-shadow: 0 4px 24px rgba(56, 139, 253, 0.08);
  }
  .card-asset:hover {
    box-shadow: 0 8px 32px rgba(56, 139, 253, 0.18);
    border-color: #388bfd;
  }

  .card-strategy {
    background: linear-gradient(135deg, #1c2a22 0%, #162018 100%);
    border: 1px solid #2a4030;
    box-shadow: 0 4px 24px rgba(63, 185, 80, 0.06);
    opacity: 0.55;
    pointer-events: none;
  }

  .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: 20px;
  }
  .card-asset .card-icon { background: rgba(56, 139, 253, 0.15); }
  .card-strategy .card-icon { background: rgba(63, 185, 80, 0.15); }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card-asset .card-label { color: #388bfd; }
  .card-strategy .card-label { color: #3fb950; }

  .card-title {
    font-size: 20px;
    font-weight: 600;
    color: #f0f6fc;
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .card-desc { font-size: 13px; color: #8b949e; line-height: 1.7; }

  .card-arrow {
    position: absolute;
    bottom: 28px;
    right: 28px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #388bfd;
    background: rgba(56, 139, 253, 0.12);
    transition: background 0.15s;
  }
  .card-asset:hover .card-arrow { background: rgba(56, 139, 253, 0.25); }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(63, 185, 80, 0.15);
    color: #3fb950;
    margin-left: 6px;
    vertical-align: middle;
  }

  .footer { margin-top: 48px; color: #484f58; font-size: 12px; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <h1>内部研究平台</h1>
  <p>Internal Research Platform · 内部使用</p>
</div>

<div class="grid">
  <a class="card card-asset" id="link-asset" href="">
    <div class="card-icon">📊</div>
    <div class="card-label">Asset Layer</div>
    <div class="card-title">资产层日报</div>
    <div class="card-desc">
      宏观 &amp; 大类资产<br>
      期货日报 · 权益日报<br>
      每日复盘与市场观点
    </div>
    <div class="card-arrow">›</div>
  </a>

  <div class="card card-strategy">
    <div class="card-icon">🔬</div>
    <div class="card-label">Strategy Layer</div>
    <div class="card-title">策略层报告 <span class="badge">即将上线</span></div>
    <div class="card-desc">
      量化策略研究<br>
      因子分析 · 回测报告<br>
      择时系统输出
    </div>
  </div>
</div>

<div class="footer">内部使用 · 请勿外传</div>

<script>
  // 根据当前域名动态生成跳转链接，兼容新旧仓库名
  const base = window.location.href.replace(/\/[^/]*$/, "");
  document.getElementById("link-asset").href = base + "/asset/";
</script>
</body>
</html>
