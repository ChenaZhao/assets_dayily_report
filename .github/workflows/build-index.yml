name: Update Index

on:
  push:
    paths:
      - 'reports/html/**.html'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          python3 - <<'EOF'
import os, re

html_dir = "reports/html"
files = sorted(
    [f for f in os.listdir(html_dir) if f.endswith(".html") and f != "index.html"],
    reverse=True
)

items = "\n".join(f'  "{f}",' for f in files)
if items:
    lines = items.rstrip().split("\n")
    lines[-1] = lines[-1].rstrip(",")
    items = "\n".join(lines)

index_path = os.path.join(html_dir, "index.html")
content = open(index_path, encoding="utf-8").read()
new_list = f"const files = [\n{items}\n];"
content = re.sub(r"const files = \[[\s\S]*?\];", new_list, content)
open(index_path, "w", encoding="utf-8").write(content)
print(f"Updated index with {len(files)} files")
EOF

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add reports/html/index.html
          git diff --cached --quiet || git commit -m "auto: update index [skip ci]"
          git push
